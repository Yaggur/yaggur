<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Регистрация — ГлавХозБаза</title>
  <link rel="stylesheet" href="styles/style.css" />
</head>
<body>
  <header class="header">
    <div class="container header__inner">
      <a href="index.html" class="logo">ГлавХозБаза</a>
      <nav class="nav">
        <ul class="nav__list">
          <li><a href="index.html" class="nav__link">Главная</a></li>
          <li><a href="catalog.html" class="nav__link">Каталог</a></li>
        </ul>
      </nav>
      <button class="burger"><span class="burger__line"></span><span class="burger__line"></span><span
          class="burger__line"></span></button>
    </div>
  </header>

  <div class="auth-wrapper">
    <div class="auth-card">
      <h2 class="auth-title">Создать аккаунт</h2>
      <form id="register-form" class="form">
        <div class="form__group">
          <label class="form__label">Имя и Фамилия</label>
          <input type="text" class="form__input" id="reg-name" required placeholder="Иван Иванов">
          <span class="form__error">Заполните это поле</span>
        </div>
        <div class="form__group">
          <label class="form__label">Email</label>
          <input type="email" class="form__input" id="reg-email" required placeholder="you@example.com">
          <span class="form__error">Введите корректный email</span>
        </div>
        <div class="form__group">
          <label class="form__label">Телефон</label>
          <input type="tel" class="form__input" id="reg-phone" placeholder="+7 (___) ___-__-__">
        </div>
        <div class="form__group">
          <label class="form__label">Пароль</label>
          <input type="password" class="form__input" id="reg-pass" required minlength="6" placeholder="••••••••">
          <span class="form__error">Минимум 6 символов</span>
        </div>
        <div class="form__group">
          <label class="form__label">Подтвердите пароль</label>
          <input type="password" class="form__input" id="reg-pass-confirm" required placeholder="••••••••">
          <span class="form__error">Пароли не совпадают</span>
        </div>
        <button type="submit" class="btn btn--block">Зарегистрироваться</button>
      </form>
      <div class="auth-footer">
        Уже есть аккаунт? <a href="login.html" style="color: var(--color-primary); font-weight: 500;">Войти</a>
      </div>
    </div>
  </div>

  <footer class="footer">
    <div class="container">
      <div class="footer-bottom">© 2026 ООО «ГлавХозБаза»</div>
    </div>
  </footer>
  <script src="js/script.js"></script>
</body>
</html>
