<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Карточка товара</title>
    <link rel="stylesheet" href="styles/style.css" />
    <style>
        .product-detail-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 48px;
            align-items: start;
        }

        .product-image-large {
            width: 100%;
            aspect-ratio: 1/1;
            background: var(--color-bg-alt);
            border-radius: var(--radius);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border: 1px solid var(--color-border);
        }

        .product-image-large img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            padding: 20px;
        }

        .product-info h1 {
            font-size: 32px;
            margin-bottom: 16px;
        }

        .product-price-large {
            font-size: 28px;
            font-weight: 700;
            color: var(--color-primary);
            margin-bottom: 24px;
        }

        .product-description {
            color: var(--color-text-light);
            line-height: 1.8;
            margin-bottom: 32px;
        }

        .quantity-selector {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 24px;
        }

        .qty-btn {
            width: 40px;
            height: 40px;
            border: 1px solid var(--color-border);
            background: var(--color-bg-alt);
            border-radius: var(--radius);
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: var(--transition);
        }

        .qty-btn:hover {
            border-color: var(--color-primary);
            color: var(--color-primary);
        }

        .qty-input {
            width: 60px;
            text-align: center;
            font-size: 18px;
            font-weight: 600;
            border: 1px solid var(--color-border);
            border-radius: var(--radius);
            padding: 8px;
        }

        .add-to-cart-large {
            width: 100%;
            padding: 16px;
            font-size: 16px;
        }

        @media (max-width: 768px) {
            .product-detail-grid {
                grid-template-columns: 1fr;
                gap: 32px;
            }
        }
    </style>
</head>

<body>

    <!-- Header -->
    <header class="header">
        <div class="container header__inner">
            <a href="index.html" class="logo">ГлавХозБаза</a>
            <nav class="nav">
                <ul class="nav__list">
                    <li><a href="index.html" class="nav__link">Главная</a></li>
                    <li><a href="catalog.html" class="nav__link">Каталог</a></li>
                    <li><a href="#" class="nav__link">О нас</a></li>
                    <li><a href="#" class="nav__link">Доставка</a></li>
                    <li><a href="#" class="nav__link">Контакты</a></li>
                </ul>
            </nav>
            <div class="header__actions">
                <button class="theme-toggle" id="themeToggle" title="Переключить тему">🌙</button>
                <a href="login.html" class="header__account">
                    <span class="header__account-icon">👤</span>
                    <span>Кабинет</span>
                </a>
                <a href="cart.html" class="header__btn" title="Корзина">
                    🛒
                    <span class="header__cart-count">0</span>
                </a>
            </div>
            <button class="burger"><span class="burger__line"></span><span class="burger__line"></span><span
                    class="burger__line"></span></button>
        </div>
    </header>

    <main class="container section">
        <nav style="font-size: 13px; color: var(--color-text-light); margin-bottom: 24px;">
            <a href="index.html">Главная</a> / <a href="catalog.html">Каталог</a> / <span
                id="breadcrumb-product">Товар</span>
        </nav>

        <div class="product-detail-grid">
            <!-- Левая часть: Картинка -->
            <div class="product-image-large">
                <img id="product-img" src="" alt="Товар" />
            </div>

            <!-- Правая часть: Инфо -->
            <div class="product-info">
                <h1 id="product-title">Название товара</h1>
                <div class="product-price-large" id="product-price">0 ₽</div>

                <div class="product-description" id="product-desc">
                    Описание товара...
                </div>

                <div class="quantity-selector">
                    <button class="qty-btn" onclick="changeQty(-1)">−</button>
                    <input type="number" class="qty-input" id="product-qty" value="1" min="1" readonly />
                    <button class="qty-btn" onclick="changeQty(1)">+</button>
                </div>

                <button class="btn add-to-cart-large" id="add-to-cart-btn">
                    Добавить в корзину
                </button>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <div class="footer-bottom">© 2026 ООО «ГлавХозБаза». Все права защищены.</div>
        </div>
    </footer>

    <script src="js/script.js"></script>
</body>

</html>
